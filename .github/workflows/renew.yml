name: Auto Renew Server

on:
  schedule:
    - cron: '0 8 * * *'   # 每天 UTC 8:00
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
          # 如果使用 SOCKS5 代理，需要安装 pysocks（这里无条件安装，无副作用）
          pip install pysocks

      - name: Run renew
        env:
          PANEL_URL: ${{ secrets.PANEL_URL }}
          PANEL_USERNAME: ${{ secrets.PANEL_USERNAME }}
          PANEL_PASSWORD: ${{ secrets.PANEL_PASSWORD }}
          SERVER_ID: ${{ secrets.SERVER_ID }}
          RENEW_API: ${{ secrets.RENEW_API }}
          # 代理配置（可选），格式：http://user:pass@host:port 或 socks5://host:port
          PROXY_URL: ${{ secrets.PROXY_URL }}
          # Telegram 通知（可选）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 其他可选参数
          THRESHOLD_HOURS: ${{ secrets.THRESHOLD_HOURS }}
          WAIT_FOR_COOLDOWN: ${{ secrets.WAIT_FOR_COOLDOWN }}
        run: python renew.py
